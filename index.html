<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Radiografía Financiera de Retiro</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#7a1fa2;
text-align:center;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:15px;
background:#7a1fa2;
color:white;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;
}

.resultado{
margin-top:30px;
padding:20px;
background:#fafafa;
border-left:5px solid #7a1fa2;
display:none;
}

.whatsapp{
margin-top:20px;
display:inline-block;
background:#25D366;
color:white;
padding:15px 20px;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Radiografía de tu Futuro Financiero</h1>

<label>Edad actual</label>
<input type="number" id="edad">

<label>Edad a la que deseas retirarte</label>
<input type="number" id="retiro">

<label>Ingreso mensual actual (MXN)</label>
<input type="number" id="ingreso">

<label>Ahorros actuales para retiro (MXN)</label>
<input type="number" id="ahorro">

<label>¿Cuánto te gustaría recibir al mes cuando te retires? (MXN)</label>
<input type="number" id="ingresoRetiro">

<button onclick="calcular()">Ver mi diagnóstico</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function calcular(){

let edad=parseFloat(document.getElementById("edad").value);
let retiro=parseFloat(document.getElementById("retiro").value);
let ingreso=parseFloat(document.getElementById("ingreso").value);
let ahorro=parseFloat(document.getElementById("ahorro").value);
let ingresoRetiro=parseFloat(document.getElementById("ingresoRetiro").value);

if(!edad || !retiro || !ingreso || !ingresoRetiro){

alert("Por favor llena todos los campos");

return;

}

let añosAhorro=retiro-edad;

let capitalNecesario=ingresoRetiro*12*20;

let capitalProyectado=ahorro*Math.pow(1.08,añosAhorro);

let capitalFaltante=capitalNecesario-capitalProyectado;

if(capitalFaltante<0){
capitalFaltante=0;
}

let inversionMensual=capitalFaltante/(añosAhorro*12);

let diagnostico="";

if(inversionMensual>ingreso*0.30){

diagnostico="RIESGO ALTO: actualmente no hay una estrategia sólida de retiro.";

}

else if(inversionMensual>ingreso*0.15){

diagnostico="RIESGO MEDIO: tienes cierta preparación pero falta optimizar tu estrategia.";

}

else{

diagnostico="BUENA PROYECCIÓN: estás encaminado pero aún puedes mejorar tu retiro.";

}

document.getElementById("resultado").style.display="block";

document.getElementById("resultado").innerHTML=

"<h2>Resultado de tu Radiografía</h2>"+

"<p><strong>Capital que necesitarías para tu retiro:</strong><br>$"+capitalNecesario.toLocaleString()+" MXN</p>"+

"<p><strong>Capital proyectado con tus ahorros actuales:</strong><br>$"+Math.round(capitalProyectado).toLocaleString()+" MXN</p>"+

"<p><strong>Capital faltante aproximado:</strong><br>$"+Math.round(capitalFaltante).toLocaleString()+" MXN</p>"+

"<p><strong>Deberías invertir aproximadamente al mes:</strong><br>$"+Math.round(inversionMensual).toLocaleString()+" MXN</p>"+

"<p><strong>Diagnóstico financiero:</strong><br>"+diagnostico+"</p>"+

"<a class='whatsapp' href='https://wa.me/2226706298?text=Hola%20quiero%20información%20sobre%20mi%20radiografía%20financiera' target='_blank'>Hablar con un asesor por WhatsApp</a>";

}

</script>

</body>
</html>
